global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:8090']
    metrics_path: /actuator/prometheus

  - job_name: rag-server
    static_configs:
      - targets: ['rag-server:8080']
    metrics_path: /metrics
