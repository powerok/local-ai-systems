<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI RAG System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0A0E1A; }
    #loading {
      display: flex; justify-content: center; align-items: center;
      height: 100vh; flex-direction: column; gap: 20px;
    }
    .loader {
      width: 48px; height: 48px;
      border: 3px solid #1E293B; border-top-color: #00D4FF;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo-text { color: #00D4FF; font-size: 20px; font-weight: 700; }
    .load-text { color: #94A3B8; font-size: 14px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-text">AI RAG System</div>
    <div class="loader"></div>
    <div class="load-text">Loading...</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        }
      }).then(function(engineInitializer) {
        return engineInitializer.initializeEngine();
      }).then(function(appRunner) {
        return appRunner.runApp();
      });
    });
  </script>
</body>
</html>
